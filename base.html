<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}Smart Content Generator - AI-powered research and content creation tool{% endblock %}">
    
    <title>{% block title %}Smart Content Generator{% endblock %}</title>
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {% block structured_data %}
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Smart Content Generator",
        "description": "AI-powered research and content generation tool",
        "applicationCategory": "ContentGeneration"
    }
    {% endblock %}
    </script>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon/favicon.ico') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='favicon/apple-touch-icon.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='favicon/site.webmanifest') }}">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    
    <!-- Web Components for Dynamic Updates -->
    <script src="{{ url_for('static', filename='js/dynamic-updater.js') }}"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" height="40">
                Smart Content Generator
            </a>
            
            <div class="nav-links">
                {% if current_user.is_authenticated %}
                    <a href="/dashboard">Dashboard</a>
                    <a href="/settings">Settings</a>
                    <a href="/logout">Logout</a>
                {% else %}
                    <a href="/login">Login</a>
                    <a href="/register">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>
    
    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    
    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2024 Smart Content Generator. All rights reserved.</p>
        </div>
    </footer>
    
    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
  </html>
